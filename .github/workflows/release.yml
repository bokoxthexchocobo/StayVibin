name: Release

# Manual-only. The release installer bundles the ~1.6 GB StayVibin Engine, which
# cannot exist on a hosted runner, so the real bundled installer is built and
# uploaded locally (see build-installer.ps1 + the release steps in the README). An
# automatic tag-triggered run could only ever produce an engine-less installer that
# would overwrite the real release asset, so the push trigger is intentionally off.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = (Select-Xml -Path StayVibin.csproj -XPath '//Version').Node.InnerText.Trim()
          Write-Host "Version: $version"
          ./build-installer.ps1 -Version $version

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StayVibin-*-setup.exe
            bin/Release/net10.0/win-x64/publish/StayVibin.exe
          generate_release_notes: true
